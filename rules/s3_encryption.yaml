rule_id: CIS-AWS-004
name: S3 Bucket Encryption Disabled
severity: Medium

compliance:
  cis_aws: "2.1.1"
  nist_csf: "PR.DS-1"

condition:
  resource_type: s3_bucket
  eval_path: encryption_enabled
  equals: false

remediation: Enable default server-side encryption (SSE-S3 or SSE-KMS) on the bucket.
